<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Labnesia — UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; }
  .kit-switcher {
    position: fixed; top: 76px; left: 50%; transform: translateX(-50%); z-index: 999;
    background: rgba(11,31,58,0.95); backdrop-filter: blur(8px);
    border-radius: 100px; padding: 6px; display: flex; gap: 4px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .kit-switcher button {
    border: none; background: transparent; color: rgba(255,255,255,0.65); font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 100px; cursor: pointer;
  }
  .kit-switcher button.active { background: var(--amber); color: var(--navy); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="FaqScreen.jsx"></script>
<script type="text/babel" src="MulaiGratisScreen.jsx"></script>
<script type="text/babel">
const { useState } = React;
function App() {
  const D = window.LabnesiaDesignSystem_8e23d2;
  const [screen, setScreen] = useState('home');
  return (
    <div>
      <div className="kit-switcher">
        <button className={screen==='home'?'active':''} onClick={() => setScreen('home')}>Beranda</button>
        <button className={screen==='faq'?'active':''} onClick={() => setScreen('faq')}>FAQ & Perbandingan</button>
        <button className={screen==='gratis'?'active':''} onClick={() => setScreen('gratis')}>Mulai Gratis</button>
      </div>
      {screen === 'home' && <HomeScreen D={D} onNavigate={setScreen} />}
      {screen === 'faq' && <FaqScreen D={D} onNavigate={setScreen} />}
      {screen === 'gratis' && <MulaiGratisScreen D={D} onNavigate={setScreen} />}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
